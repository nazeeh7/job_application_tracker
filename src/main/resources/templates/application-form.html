<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Application</title>
<link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="min-h-screen bg-[#f3f4f6] text-slate-900">
  <div class="mx-auto max-w-5xl px-6 py-8">
    
    <!-- Top Bar -->
	<div class="mx-auto mb-6 flex max-w-3xl items-center justify-between">
	
	  <!-- Back -->
	  <a th:href="@{/applications}"
	     class="inline-flex items-center gap-2 text-[28px] font-medium text-slate-900 hover:text-slate-700">
	    <span class="text-base">←</span>
	    <span>Back to Overview</span>
	  </a>
	
	  <!-- Right Side -->
	  <div class="flex items-center gap-2">
	
	    <!-- Language Button -->
	    <button type="button"
	            class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white shadow-sm hover:bg-slate-50">
	      <span class="text-lg">🌐</span>
	    </button>
	
	    <!-- Logout -->
	    <form th:action="@{/logout}" method="post">
	      <button type="submit"
	              class="flex h-10 items-center justify-center rounded-xl border border-slate-300 bg-white px-4 text-sm font-semibold text-slate-900 shadow-sm hover:bg-slate-50">
	        Logout
	      </button>
	    </form>
	
	  </div>
	</div>

    <!-- Card -->
    <div class="mx-auto max-w-3xl rounded-2xl border border-slate-300 bg-white px-6 py-8 shadow-sm md:px-7">
      <h1 class="mb-8 text-[28px] font-extrabold leading-tight tracking-tight text-slate-950">
        Add New Application
      </h1>

      <form th:action="@{/applications}" th:object="${jobApplication}"
            method="post"
            class="grid grid-cols-1 gap-6 md:grid-cols-2">

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Company *</label>
          <input type="text" th:field="*{company.name}" placeholder="e.g. Tech Inc." required
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Position *</label>
          <input type="text" th:field="*{position}" placeholder="e.g. Software Developer" required
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Type Of Application *</label>
          <select th:field="*{applicationType}"
                  class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
            <option th:each="applicationTypeItem : ${applicationTypes}"
                    th:value="${applicationTypeItem}"
                    th:text="${applicationTypeItem}"></option>
          </select>
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Application Date *</label>
          <input type="date" th:field="*{applicationDate}" required
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Contact Person</label>
          <input type="text" th:field="*{contactPerson}" placeholder="Contact person name"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Email</label>
          <input type="email" th:field="*{email}" placeholder="contact@company.com"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Phone</label>
          <input type="text" th:field="*{phone}" placeholder="+1 123 456 789"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Street *</label>
          <input type="text" th:field="*{company.address.street}" placeholder="Street 123, ZIP City"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>
        
       <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">House Number *</label>
          <input type="text" th:field="*{company.address.houseNumber}" placeholder="123"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>
        
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">Zip Code *</label>
          <input type="text" th:field="*{company.address.zipCode}" placeholder="00000"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>
        
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-900">City *</label>
          <input type="text" th:field="*{company.address.city}" placeholder="City"
                 class="h-11 w-full rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-semibold text-slate-900">Notes</label>
          <textarea th:field="*{notes}" rows="4"
                    placeholder="Additional information about the application..."
                    class="min-h-[120px] w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200 resize-none"></textarea>
        </div>

        <div class="flex justify-end gap-2 pt-2 md:col-span-2">
          <a th:href="@{/applications}"
             class="inline-flex h-10 items-center justify-center rounded-xl border border-slate-300 bg-white px-5 text-sm font-semibold text-slate-900 hover:bg-slate-50">
            Cancel
          </a>

          <button type="submit"
                  class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-950 px-6 text-sm font-semibold text-white shadow-sm hover:bg-slate-800">
            Add
          </button>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
