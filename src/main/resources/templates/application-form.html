<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Application</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-[#f3f4f6] min-h-screen text-slate-900">

<div class="max-w-4xl mx-auto px-6 pt-8 pb-16">

    <!-- Top Bar -->
    <div class="flex items-center justify-between mb-6">
        <a th:href="@{/}"
           class="inline-flex items-center gap-2 text-sm font-medium text-slate-900 hover:text-slate-700">
            <span class="text-base">←</span>
            <span>Back to Overview</span>
        </a>

        <button type="button"
                class="h-10 w-10 rounded-xl border border-slate-200 bg-white flex items-center justify-center shadow-sm hover:bg-slate-50">
            <span class="text-lg">🌐</span>
        </button>
    </div>

    <!-- Card -->
    <div class="max-w-3xl mx-auto rounded-2xl border border-slate-200 bg-white shadow-sm px-6 py-8 md:px-7 md:py-8">
        <h1 class="text-[28px] leading-tight font-extrabold tracking-tight text-slate-950 mb-8">
            Add New Application
        </h1>

        <form th:action="@{/applications}" th:object="${jobApplication}" method="post" class="space-y-6">

            <!-- Row 1 -->
            <div class="grid grid-cols-2 md:grid-cols-2 gap-4 md:gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Company *</label>
                    <input
                        type="text"
                        th:field="*{company}"
                        placeholder="e.g. Tech Inc."
                        required
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Position *</label>
                    <input
                        type="text"
                        th:field="*{position}"
                        placeholder="e.g. Software Developer"
                        required
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                </div>
            </div>

            <!-- Row 2 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Status *</label>
                    <select
                        th:field="*{status}"
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                        <option th:each="statusItem : ${statuses}"
                                th:value="${statusItem}"
                                th:text="${statusItem}">
                        </option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Application Date *</label>
                    <input
                        type="date"
                        th:field="*{applicationDate}"
                        required
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                </div>
            </div>

            <!-- Row 3 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Contact Person</label>
                    <input
                        type="text"
                        th:field="*{contactPerson}"
                        placeholder="Contact person name"
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-900 mb-2">Email</label>
                    <input
                        type="email"
                        th:field="*{email}"
                        placeholder="contact@company.com"
                        class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
                </div>
            </div>

            <!-- Row 4 -->
            <div class="max-w-[48.7%] md:max-w-none md:w-[calc(50%-10px)]">
                <label class="block text-sm font-semibold text-slate-900 mb-2">Phone</label>
                <input
                    type="text"
                    th:field="*{phone}"
                    placeholder="+1 123 456 789"
                    class="w-full h-11 rounded-xl border border-slate-200 bg-slate-100 px-4 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200">
            </div>

            <!-- Notes -->
            <div>
                <label class="block text-sm font-semibold text-slate-900 mb-2">Notes</label>
                <textarea
                    th:field="*{notes}"
                    rows="4"
                    placeholder="Additional information about the application..."
                    class="w-full min-h-[120px] rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-[15px] text-slate-800 placeholder:text-slate-400 outline-none focus:border-slate-300 focus:ring-2 focus:ring-slate-200 resize-none"></textarea>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-2 pt-2">
                <a th:href="@{/}"
                   class="inline-flex h-10 items-center justify-center rounded-xl border border-slate-300 bg-white px-5 text-sm font-semibold text-slate-900 hover:bg-slate-50">
                    Cancel
                </a>

                <button
                    type="submit"
                    class="inline-flex h-10 items-center justify-center rounded-xl bg-slate-950 px-6 text-sm font-semibold text-white shadow-sm hover:bg-slate-800">
                    Add
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
