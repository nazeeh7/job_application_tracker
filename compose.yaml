services:
  server:
    build:
      context: .
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/job_application_tracker
      SPRING_DATASOURCE_USERNAME: job_user
      SPRING_DATASOURCE_PASSWORD: job_password

  mysql:
    image: mysql:8.4
    container_name: job-application-tracker-mysql
    restart: always
    environment:
      MYSQL_DATABASE: job_application_tracker
      MYSQL_USER: job_user
      MYSQL_PASSWORD: job_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "job_user", "-pjob_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data: